name: ci
on:
  push: { branches: [main] }
  pull_request:
jobs:
  engine:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ["20", "22"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install (locked)
        run: npm ci
      - name: Lint (biome)
        run: npm run lint
      - name: Typecheck (tsc strict)
        run: npm run typecheck
      - name: Build (tsup)
        run: npm run build
      - name: Test with coverage gate
        run: npm run coverage
      - name: Validate repo with the built CLI (incl. 80-line skill budget)
        run: node dist/cli/main.js validate --max-skill-lines 80
      - name: Hook self-test on this OS
        run: node dist/cli/main.js doctor --hooks
      - name: Audit runtime dependencies
        run: npm audit --omit=dev
